<script>
  function atualizarMeta() {
    // 1. Pega apenas a parte do hash (ex: #/butique/pisau&prod...)
    let hashOriginal = window.location.hash; 

    // 2. Limpa o que vem depois de & ou ? para não bugar com o link da Kiwify
    const hash = hashOriginal.split('&')[0].split('?')[0];

    const metaTag = document.getElementById('meta-desc');

    // 3. Compara apenas o caminho relativo (o que começa com #)
    if (hash === '#/sobre') {
      document.title = "Sobre | Pitore";
      metaTag.content = "Observe o meu negócio mais de perto e verá o enigma sublime em sua essência"; 
    } else if (hash === '#/sobre/contato') {
      document.title = "Contato | Pitore";
      metaTag.content = "O contato da Pitore é simples e versátil. Tire dúvidas, envie sugestões ou diga coisas boas.";
    } else if (hash === '#/sobre/mim') {
      document.title = "Mim | Pitore";
      metaTag.content = "Um pouco sobre mim, a Pitore, que é uma empresa, mas começou como uma pessoa. Uma breve história do Din.";
    } else if (hash === '#/sobre/etica') {
      document.title = "Ética | Pitore";
      metaTag.content = "Na Pitore estamos sempre cuidando da ética. Temos dez conceitos que seguimos, desde educação e arte, até privacidade.";
    } else if (hash === '#/sobre/marca') {
      document.title = "Marca | Pitore";
      metaTag.content = "A marca Pitore é muito peculiar. Conheça um pouco as logos, nomes e lemas memoráveis.";
    } else if (hash === '#/sobre/diario') {
      document.title = "Diário | Pitore";
      metaTag.content = "Diário da Pitore é uma fonte de informação que arquiteta os 7 pilares da experiência humana. Leia nossos conteúdos, novidades, atualizações e imagens.";
    } else if (hash === '#/sobre/juridico') {
      document.title = "Jurídico | Pitore";
      metaTag.content = "O jurídico da Pitore é transparente. Saiba qual é os termos de uso, privacidade e propriedade intelectual.";
    } else if (hash === '#/butique/pistilo') {
      document.title = "Pistilo | Pitore";
      metaTag.content = "Pistilo é um livro de Estilo. Pensado para mostrar a sua Beleza, Visual e Moda.";
    } else if (hash === '#/butique/pilin') {
      document.title = "PiLin | Pitore";
      metaTag.content = "PiLin é um livro de Língua. Pensado para você adquirir uma nova língua.";
    } else if (hash === '#/butique/pisofia') {
      document.title = "PiSofia | Pitore";
      metaTag.content = "PiSofia é um livro de Filosofia. Pensado para você se autoconhecer, vai desde a Natureza até a Política.";
    } else if (hash === '#/butique/pisau') {
      document.title = "PiSau | Pitore";
      metaTag.content = "PiSau é um livro de Saúde. Pensado para melhorar a sua Saúde Física, Mental, Emocional e Espiritual.";
    } else if (hash === '#/butique/pidin') {
      document.title = "PiDin | Pitore";
      metaTag.content = "PiDin é um livro de Dinheiro. Pensado para você ganhar com Empregadorismo, Investimento, Autonomismo ou Empreendedorismo.";
    } else if (hash === '#/butique/piteni') {
      document.title = "PiTeni | Pitore";
      metaTag.content = "PiTeni é um livro de Entretenimento. Pensado para quem gosta de Escutar, Ler, Assistir ou Jogar.";
    } else if (hash === '#/butique/pimor') {
      document.title = "PiMor | Pitore";
      metaTag.content = "PiMor é um livro de Amor. Pensado para despertar a sua Sedução, Relação e Sexo.";
    } else if (hash === '#/butique') {
      document.title = "Butique | Pitore";
      metaTag.content = "Compre os produtos enigmáticos da Pitore. A butique está te esperando.";
    } else if (hash === '#/loja') {
      document.title = "Loja | Pitore";
      metaTag.content = "Compre os produtos que você conhece através da Pitore. Eles estão na loja.";
    } else {
      document.title = "Pitore"; 
      metaTag.content = "Entre no mundo enigmático da Pitore e compre seu PiTeni, PiDin, PiMor ou... conheça a nossa ética, marca e diário.";
    }
  }

  window.addEventListener('hashchange', atualizarMeta);
  window.addEventListener('load', atualizarMeta);
</script>
